server {
    listen 80;
    listen [::]:80;
    server_name 26czrt.cfd www.26czrt.cfd;

    return 301 https://26czrt.cfd$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 26czrt.cfd;

    ssl_certificate /etc/letsencrypt/live/26czrt.cfd/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/26czrt.cfd/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 1024m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.26czrt.cfd;

    ssl_certificate /etc/letsencrypt/live/26czrt.cfd/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/26czrt.cfd/privkey.pem;

    return 301 https://26czrt.cfd$request_uri;
}